<!DOCTYPE html>
<html>
<head>
  <title>QuickLoan India</title>
</head>
<body>

<h1>QuickLoan India</h1>

<h2>Register</h2>
<input id="rname" placeholder="Name">
<input id="remail" placeholder="Email">
<input id="rpass" type="password" placeholder="Password">
<button onclick="register()">Register</button>

<h2>Login</h2>
<input id="lemail" placeholder="Email">
<input id="lpass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<br><br>
<a href="admin.html">Admin Login</a>

<script>
function register(){
  let user = {
    name: rname.value,
    email: remail.value,
    pass: rpass.value
  };
  localStorage.setItem(remail.value, JSON.stringify(user));
  alert("Registered!");
}

function login(){
  let data = JSON.parse(localStorage.getItem(lemail.value));
  if(data && data.pass === lpass.value){
    localStorage.setItem("currentUser", lemail.value);
    window.location = "dashboard.html";
  } else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
